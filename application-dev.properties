# ===================================================
# COMMON DEV PROPERTIES
# ===================================================

# ===============================
# EUREKA CLIENT
# ===============================
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=http://localhost:8761/eureka


# ===============================
# H2 DATABASE
# ===============================
spring.datasource.url=jdbc:h2:mem:currencydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=Siva123


# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


# ===============================
# H2 CONSOLE
# ===============================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console


# ===============================
# REDIS CACHE
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.cache.cache-names=currencyExchange
spring.cache.redis.time-to-live=60000
spring.cache.redis.cache-null-values=false
spring.cache.type=redis


# ===============================
# RESILIENCE4J
# ===============================
resilience4j.circuitbreaker.instances.myCircuitBreaker.slidingWindowSize=10

resilience4j.circuitbreaker.instances.myCircuitBreaker.failureRateThreshold=50

resilience4j.circuitbreaker.instances.myCircuitBreaker.waitDurationInOpenState=30s

resilience4j.circuitbreaker.instances.myCircuitBreaker.automatic-transition-from-open-to-half-open-enabled=true

resilience4j.circuitbreaker.instances.myCircuitBreaker.permitted-number-of-calls-in-half-open-state=5


# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=*

management.endpoint.health.show-details=always


# ===============================
# SPRING BOOT ADMIN
# ===============================
spring.boot.admin.client.url=http://localhost:1111


# ===============================
# ZIPKIN
# ===============================
management.tracing.sampling.probability=1.0

management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans


# ===============================
# LOGGING
# ===============================
logging.level.root=INFO

logging.level.com.example=TRACE

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n

logging.file.path=logs

logging.file.name=logs/microservice.log
