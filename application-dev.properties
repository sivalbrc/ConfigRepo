# ===============================
# APPLICATION
# ===============================
spring.application.name=currency-exchange-service

server.port=8081

message=Development Environment


# ===============================
# DATABASE CONFIGURATION
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/devdb
spring.datasource.username=root
spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect


# ===============================
# LOGGING
# ===============================
logging.level.root=INFO

logging.level.com.currencyexchangeservice=TRACE

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n


# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always

management.info.env.enabled=true


# ===============================
# ZIPKIN
# ===============================
management.tracing.sampling.probability=1.0

management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans


# ===============================
# EUREKA CLIENT
# ===============================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

eureka.instance.prefer-ip-address=true


# ===============================
# CONFIG SERVER
# ===============================
spring.config.import=optional:configserver:http://localhost:8888


# ===============================
# RESILIENCE4J - CIRCUIT BREAKER
# ===============================
resilience4j.circuitbreaker.instances.currencyBreaker.register-health-indicator=true

resilience4j.circuitbreaker.instances.currencyBreaker.sliding-window-size=10

resilience4j.circuitbreaker.instances.currencyBreaker.failure-rate-threshold=50

resilience4j.circuitbreaker.instances.currencyBreaker.wait-duration-in-open-state=10s

resilience4j.circuitbreaker.instances.currencyBreaker.permitted-number-of-calls-in-half-open-state=3

resilience4j.circuitbreaker.instances.currencyBreaker.minimum-number-of-calls=5


# ===============================
# RESILIENCE4J - RETRY
# ===============================
resilience4j.retry.instances.currencyRetry.max-attempts=3

resilience4j.retry.instances.currencyRetry.wait-duration=2s


# ===============================
# RESILIENCE4J - RATE LIMITER
# ===============================
resilience4j.ratelimiter.instances.currencyRateLimiter.limit-for-period=5

resilience4j.ratelimiter.instances.currencyRateLimiter.limit-refresh-period=10s

resilience4j.ratelimiter.instances.currencyRateLimiter.timeout-duration=1s


# ===============================
# INFO
# ===============================
info.app.name=Currency Exchange Service
info.app.version=1.0
info.app.description=Spring Boot Microservice Demo
