# =========================================
# APPLICATION
# =========================================
spring.application.name=your-service-name

server.port=8081


# =========================================
# DATABASE
# =========================================
spring.datasource.url=jdbc:mysql://localhost:3306/microservice_db

spring.datasource.username=root

spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# =========================================
# JPA / HIBERNATE
# =========================================
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect


# =========================================
# LOGGING
# =========================================
logging.level.root=INFO

logging.level.com.example=TRACE

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%level] %logger{36} - %msg%n


# =========================================
# ACTUATOR
# =========================================
management.endpoints.web.exposure.include=*

management.endpoint.health.show-details=always

management.info.env.enabled=true


# =========================================
# ZIPKIN TRACING
# =========================================
management.tracing.sampling.probability=1.0

management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans


# =========================================
# EUREKA CLIENT
# =========================================
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

eureka.instance.prefer-ip-address=true


# =========================================
# CONFIG SERVER
# =========================================
spring.config.import=optional:configserver:http://localhost:8888


# =========================================
# RESILIENCE4J CIRCUIT BREAKER
# =========================================
resilience4j.circuitbreaker.instances.default.register-health-indicator=true

resilience4j.circuitbreaker.instances.default.sliding-window-size=10

resilience4j.circuitbreaker.instances.default.failure-rate-threshold=50

resilience4j.circuitbreaker.instances.default.wait-duration-in-open-state=10s


# =========================================
# RESILIENCE4J RETRY
# =========================================
resilience4j.retry.instances.default.max-attempts=3

resilience4j.retry.instances.default.wait-duration=2s


# =========================================
# RESILIENCE4J RATE LIMITER
# =========================================
resilience4j.ratelimiter.instances.default.limit-for-period=5

resilience4j.ratelimiter.instances.default.limit-refresh-period=10s

resilience4j.ratelimiter.instances.default.timeout-duration=1s


# =========================================
# APPLICATION INFO
# =========================================
info.app.name=Microservice Application

info.app.version=1.0

info.app.description=Spring Boot Microservice


# =========================================
# SPRING BOOT BANNER
# =========================================
spring.main.banner-mode=console
